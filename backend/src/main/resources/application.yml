spring:
  application:
    name: edgetwin-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/edgetwin}
    username: ${SPRING_DATASOURCE_USERNAME:edgetwin}
    password: ${SPRING_DATASOURCE_PASSWORD:edgetwin_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Edge AI service configuration
edge-ai:
  enabled: ${EDGE_AI_ENABLED:false}
  base-url: ${EDGE_AI_BASE_URL:http://localhost:8000}
  timeout: 5000

server:
  port: 8080

logging:
  level:
    com.edgetwin: DEBUG
    org.springframework.web: INFO
