# H2 in-memory profile — run without Docker or PostgreSQL
# Activate with: java -jar app.jar --spring.profiles.active=h2

spring:
  datasource:
    url: jdbc:h2:mem:edgetwin;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

  h2:
    console:
      enabled: true
      path: /h2-console

edge-ai:
  enabled: ${EDGE_AI_ENABLED:false}
  base-url: ${EDGE_AI_BASE_URL:http://localhost:8000}
  timeout: 5000
